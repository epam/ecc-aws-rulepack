policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificCluster
    filters:
      - type: value
        key: clusterArn
        op: in
        value:
          - arn:aws:ecs:us-east-1:111111111111:cluster/493_ecs_cluster_red

  - name: PolicyTest_NoFoundClusters
    filters:
      - type: value
        key: clusterArn
        op: in
        value:
          - arn:aws:ecs:us-east-1:111111111111:cluster/not_found
