policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificBackupVault
    filters:
      - type: value
        key: BackupVaultArn
        op: in
        value:
          - arn:aws:backup:us-east-1:111111111111:backup-vault:293_backup_vault_red

  - name: PolicyTest_NoFoundBackupVaults
    filters:
      - type: value
        key: BackupVaultArn
        op: in
        value:
          - arn:aws:backup:us-east-1:111111111111:backup-vault:not_found
