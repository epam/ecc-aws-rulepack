policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificDeliveryStream
    filters:
      - type: value
        key: DeliveryStreamARN
        op: in
        value:
          - arn:aws:firehose:us-east-1:111111111111:deliverystream/334_kinesis_firehose_red

  - name: PolicyTest_NoFoundDeliveryStreams
    filters:
      - type: value
        key: DeliveryStreamARN
        op: in
        value:
          - arn:aws:firehose:us-east-1:111111111111:deliverystream/334_kinesis_firehose_not_found
