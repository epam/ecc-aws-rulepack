policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificSecurityConfiguration
    filters:
      - type: value
        key: Name
        op: in
        value:
          - "401_security_configuration_green"

  - name: PolicyTest_NoFoundSecurityConfigurations
    filters:
      - type: value
        key: Name
        op: in
        value:
          - "254_security_configuration_not_found"
