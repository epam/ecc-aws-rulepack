policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificFileSystem
    filters:
      - type: value
        key: FileSystemArn
        op: in
        value:
          - arn:aws:elasticfilesystem:us-east-1:644160558196:file-system/fs-0383ff4824ec50307

  - name: PolicyTest_NoFoundFileSystems
    filters:
      - type: value
        key: FileSystemArn
        op: in
        value:
          - arn:aws:elasticfilesystem:us-east-1:644160558196:file-system/not_found
