policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificCredential
    filters:
      - type: value
        key: arn
        op: in
        value:
          - arn:aws:codebuild:us-east-1:111111111111:token/bitbucket

  - name: PolicyTest_NoFoundCredentials
    filters:
      - type: value
        key: arn
        op: in
        value:
          - arn:aws:codebuild:us-east-1:111111111111:token/not-found
