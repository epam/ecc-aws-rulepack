policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificDomain
    filters:
      - type: value
        key: ARN
        op: in
        value:
          - arn:aws:es:us-east-1:this:domain/domain-156-red

  - name: PolicyTest_NoFoundDomains
    filters:
      - type: value
        key: ARN
        op: in
        value:
          - arn:aws:es:us-east-1:this:domain/domain-156-red-zzzz-notfound
