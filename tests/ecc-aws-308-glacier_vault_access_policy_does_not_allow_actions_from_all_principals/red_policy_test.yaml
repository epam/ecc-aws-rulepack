policies:
  - name: PolicyTest

  - name: PolicyTest_SpecificVault
    filters:
      - type: value
        key: VaultARN
        op: in
        value:
          - arn:aws:glacier:us-east-1:111111111111:vaults/308_glacier_vault_red

  - name: PolicyTest_NoFoundVaults
    filters:
      - type: value
        key: VaultARN
        op: in
        value:
          - arn:aws:glacier:us-east-1:111111111111:vaults/308_glacier_vault_not_found
